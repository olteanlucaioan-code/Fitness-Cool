<!DOCTYPE html>
<html>
<head>
    <title>Înregistrare - Fitness Cool</title>
    <style>
        body {
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('/static/fundal.gif');
            background-size: cover; color: white;
        }
        .form-card { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 20px; backdrop-filter: blur(15px); width: 320px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: rgba(255,255,255,0.2); color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 20px; border-radius: 30px; border: none; background: #38ef7d; color: black; font-weight: bold; cursor: pointer; }
        a { color: #38ef7d; text-decoration: none; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>Cont Nou</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Nume Utilizator" required>
            <input type="password" name="password" placeholder="Parolă" required>
            <button type="submit">ÎNREGISTRARE</button>
        </form>
        <p><a href="/login">Ai deja cont? Loghează-te</a></p>
    </div>
</body>
</html>
